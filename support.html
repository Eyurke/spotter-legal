<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spotter — Support</title>
<meta name="description" content="Get help with the Spotter gym-tracking app." />
<style>
  :root{
    --bg:#0d0d0d; --card:#161616; --border:#262626;
    --text:#ededed; --muted:#9a9a9a; --accent:#b5f53f;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:0 20px;
  }
  .wrap{max-width:780px; margin:0 auto; padding:56px 0 96px}
  header{border-bottom:1px solid var(--border); padding-bottom:24px; margin-bottom:36px}
  .brand{display:flex; align-items:center; gap:12px; margin-bottom:18px}
  .dot{width:14px; height:14px; border-radius:4px; background:var(--accent)}
  .brand span{font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:14px}
  h1{font-size:30px; line-height:1.2; margin:0 0 10px}
  .meta{color:var(--muted); font-size:14px; margin:0}
  p{color:#d6d6d6}
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}
  .contact{background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; margin-top:14px}
  footer{margin-top:56px; color:var(--muted); font-size:13px; text-align:center}
  footer a{color:var(--muted); text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span><span>Spotter</span></div>
    <h1>Support</h1>
    <p class="meta">We&rsquo;re here to help.</p>
  </header>

  <p>For any questions, issues, or feedback, you can reach us by email and we&rsquo;ll get back to you as soon as possible.</p>
  <div class="contact"><strong>Email:</strong> <a href="mailto:evgenyyurkevich40@gmail.com">evgenyyurkevich40@gmail.com</a></div>

  <footer>
    <p><a href="./index.html">Privacy Policy</a> &middot; <a href="./terms.html">Terms of Service</a> &middot; <a href="./community.html">Community Guidelines</a> &middot; <a href="./support.html">Support</a></p>
    &copy; 2026 Spotter. All rights reserved.
  </footer>
</div>
</body>
</html>
